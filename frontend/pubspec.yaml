name: ipadprocad
description: 2D CAD for iPad (Flutter frontend, QCAD core via FFI)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  file_picker: ^8.1.2
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  # In-repo iOS plugin (real UIKit context menus / share sheet / Files export).
  # A path dependency, so CocoaPods picks it up from the generated Podfile just
  # like file_picker — no hand-written code in the CI-scaffolded Runner target.
  native_menu:
    path: packages/native_menu
  # In-repo iOS plugin: RealityKit-backed 3D viewport (GPU depth buffer + PBR
  # shading) that replaces the CPU painter's-algorithm renderer on device.
  # Same path-dependency delivery as native_menu.
  reality_view:
    path: packages/reality_view
  flutter_svg: ^2.0.10
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
