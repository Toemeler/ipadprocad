name: ipadprocad
description: 2D CAD for iPad (Flutter frontend, QCAD core via FFI)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  file_picker: ^8.1.2
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  flutter_svg: ^2.0.10
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
