name: Core + C-API Build (iOS)  # M1 core (green) + M2 C-ABI wrapper & iOS bundle

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-core-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (host, for tools)
        id: qt_host_install
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt-host'
          cache: true

      - name: Capture host Qt path
        id: qt_host
        run: |
          echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"
          echo "QT_ROOT_DIR after host install: ${QT_ROOT_DIR}" > env-dump.log

      - name: Install Qt6 (iOS)
        id: qt_ios_install
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          dir: '${{ github.workspace }}/qt-ios'
          cache: true

      - name: Capture iOS Qt path
        id: qt_ios
        run: |
          echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"
          echo "QT_ROOT_DIR after iOS install: ${QT_ROOT_DIR}" >> env-dump.log

      - name: Install Ninja
        run: brew install ninja

      - name: Configure (iOS target)
        working-directory: backend/qcad-core
        run: |
          {
          set -o pipefail
          echo "qt_host path: ${{ steps.qt_host.outputs.path }}"
          echo "qt_ios path: ${{ steps.qt_ios.outputs.path }}"
          ls "${{ steps.qt_host.outputs.path }}/lib/cmake/Qt6CoreTools" 2>&1 || echo "no Qt6CoreTools dir at host path"
          # QCAD_CAPI_SMOKE stays OFF on iOS: there is no link step for .a there,
          # so the executable smoke test only runs on the Linux host build.
          cmake -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON
          } 2>&1 | tee ../../ci-configure.log

      - name: Build (core + C-API wrapper)
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          # -k 0 (keep-going): surface ALL compile errors in a single run rather
          # than stopping at the first — needed for fast iOS-portability iteration.
          # The static qcadcapi target is part of the tree (root CMakeLists), so
          # this builds the M2 wrapper for arm64/iphoneos alongside the core.
          cmake --build build -j -- -k 0 2>&1 | tee ../../ci-build.log

      - name: Verify static libraries (incl. C-API)
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            expected=(
              release/libqcadcore.a
              release/libqcadentity.a
              release/libqcadoperations.a
              release/libdxflib.a
              plugins/libqcaddxf.a
              release/libqcadcapi.a
            )
            missing=0
            for f in "${expected[@]}"; do
              if [ -f "$f" ]; then
                echo "OK   $f"
                lipo -info "$f" 2>/dev/null || true
              else
                echo "MISSING $f"
                missing=1
              fi
            done
            [ "$missing" -eq 0 ] || { echo "One or more expected libraries are missing."; exit 1; }
          } 2>&1 | tee ../../ci-verify.log

      - name: Bundle combined static library (iOS arm64)
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            # Merge the C-API wrapper + all core libs into a single archive the
            # app can link directly. libtool resolves duplicate members.
            libtool -static -o release/libipadprocad.a \
              release/libqcadcapi.a \
              release/libqcadcore.a \
              release/libqcadentity.a \
              release/libqcadoperations.a \
              plugins/libqcaddxf.a \
              release/libdxflib.a
            echo "Combined library:"
            ls -la release/libipadprocad.a
            lipo -info release/libipadprocad.a
          } 2>&1 | tee ../../ci-bundle.log

      - name: Package XCFramework (best-effort)
        id: xcframework
        continue-on-error: true
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            rm -rf release/ipadprocad.xcframework include-public
            mkdir -p include-public
            cp src/capi/qcad_capi.h include-public/
            xcodebuild -create-xcframework \
              -library release/libipadprocad.a -headers include-public \
              -output release/ipadprocad.xcframework
            echo "XCFramework created:"
            find release/ipadprocad.xcframework -maxdepth 2 -print
          } 2>&1 | tee ../../ci-xcframework.log

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipadprocad-ios-capi
          path: |
            backend/qcad-core/release/libipadprocad.a
            backend/qcad-core/src/capi/qcad_capi.h
            backend/qcad-core/release/ipadprocad.xcframework
          if-no-files-found: warn

      - name: Commit debug logs
        if: always()
        run: |
          mkdir -p ci-logs
          for l in env-dump ci-configure ci-build ci-verify ci-bundle ci-xcframework; do
            cp "$l.log" ci-logs/ 2>/dev/null || true
          done
          cp backend/qcad-core/build/CMakeFiles/CMakeError.log ci-logs/ 2>/dev/null || true
          cp backend/qcad-core/build/CMakeFiles/CMakeOutput.log ci-logs/ 2>/dev/null || true
          git config user.email "ci@ipadprocad.local"
          git config user.name "iPadProCAD CI"
          git add -f ci-logs
          git commit -m "CI: debug logs from run ${{ github.run_id }}" || exit 0
          git push origin HEAD:ci-debug-logs --force

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-capi-build-log
          path: backend/qcad-core/build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # M3 — headless logic test on iOS. Builds the C-API + core + smoke for the
  # iphonesimulator (arm64) using the same CMake/Qt path proven for the device
  # in build-core-ios, then runs the smoke INSIDE a booted iOS Simulator via
  # `simctl spawn` and asserts "SMOKE: PASS". This exercises the real QCAD core
  # logic (entity create/count/bbox + DXF round-trip) on the iOS runtime.
  # NOTE: exercising the Dart FFI on-device needs the Flutter/Dart runtime and
  # is deferred to M4 (see HANDOFF.md).
  # ---------------------------------------------------------------------------
  m3-ios-sim-logic:
    name: M3 headless logic test (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (host, for tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt-host'
          cache: true

      - name: Capture host Qt path
        id: qt_host
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Qt6 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          dir: '${{ github.workspace }}/qt-ios'
          cache: true

      - name: Capture iOS Qt path
        id: qt_ios
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Ninja
        run: brew install ninja

      - name: Probe Qt iOS architectures (diagnostic)
        run: |
          {
            QTIOS="${{ steps.qt_ios.outputs.path }}"
            echo "iOS Qt path: $QTIOS"
            echo "== arch of the static libs =="
            for l in libQt6Core.a libQt6Gui.a libQt6Xml.a; do
              printf '%s: ' "$l"; lipo -info "$QTIOS/lib/$l" 2>&1 || true
            done
            echo "== arch/platform of a prebuilt Qt resource object =="
            OBJ="$QTIOS/lib/objects-Release/Gui_resources_1/.qt/rcc/qrc_qpdf_init.cpp.o"
            file "$OBJ" 2>&1 || true
            otool -l "$OBJ" 2>/dev/null | grep -A4 -i 'LC_BUILD_VERSION' | head -20 || true
            echo "== any simulator-specific tree? =="
            find "$QTIOS" -iname '*simulator*' 2>/dev/null | head -20 || true
          } 2>&1 | tee ci-qt-ios-layout.log

      - name: Configure (iOS Simulator, arm64)
        working-directory: backend/qcad-core
        run: |
          {
          set -o pipefail
          cmake -B build-sim \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON \
            -DQCAD_CAPI_SMOKE=ON
          } 2>&1 | tee ../../ci-sim-configure.log

      - name: Build (core + C-API + smoke, simulator)
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          # First attempt: plain simulator link.
          if cmake --build build-sim -j -- -k 0 2>&1 | tee ../../ci-sim-build.log; then
            echo "sim build ok (no workaround needed)"
            exit 0
          fi
          # The aqt/online-installer Qt for iOS ships DEVICE-only slices (arm64,
          # platform=iOS), including the prebuilt resource objects
          # (objects-Release/.../qrc_*_init.cpp.o). ld then aborts with
          #   "building for 'iOS-simulator', but linking in object file built for 'iOS'"
          # The code itself is arm64 and only calls libSystem/UIKit symbols that
          # exist in the simulator SDK too, so we relink with the classic linker
          # and ld's platform check disabled. This affects ONLY this CI logic
          # test; the shipping device build (build-core-ios) links normally.
          echo "== retrying with -ld_classic + LD_NO_PLATFORM_CHECK=1 ==" | tee -a ../../ci-sim-build.log
          cmake -B build-sim \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON \
            -DQCAD_CAPI_SMOKE=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-ld_classic" 2>&1 | tee -a ../../ci-sim-build.log
          LD_NO_PLATFORM_CHECK=1 cmake --build build-sim -j -- -k 0 2>&1 | tee -a ../../ci-sim-build.log

      - name: Locate & inspect smoke binary
        working-directory: backend/qcad-core
        run: |
          {
            set -o pipefail
            SMOKE="$(find . -name qcad_capi_smoke -type f | head -1)"
            echo "smoke binary (relative): $SMOKE"
            [ -n "$SMOKE" ] || { echo "smoke binary not found"; exit 1; }
            SMOKE_ABS="$(cd "$(dirname "$SMOKE")" && pwd)/$(basename "$SMOKE")"
            echo "$SMOKE_ABS" > ../../smoke_path.txt
            echo "smoke binary (abs): $SMOKE_ABS"
            file "$SMOKE_ABS" || true
            lipo -info "$SMOKE_ABS" || true
            echo "== build-version load command (expect platform 7 = iOS Simulator) =="
            otool -l "$SMOKE_ABS" | grep -A5 -i 'LC_BUILD_VERSION' | head -40 || true
          } 2>&1 | tee ../../ci-sim-inspect.log

      - name: Boot simulator & run headless logic test
        working-directory: backend/qcad-core
        run: |
          {
            set -o pipefail
            SMOKE_ABS="$(cat ../../smoke_path.txt)"
            echo "smoke: $SMOKE_ABS"
            echo "== runtimes =="
            xcrun simctl list runtimes || true
            UDID=""
            for name in "iPhone 15" "iPhone 14" "iPhone SE (3rd generation)" "iPhone 15 Pro"; do
              if UDID="$(xcrun simctl create m3-iphone "$name" 2>/dev/null)"; then
                echo "created sim '$name' -> $UDID"; break
              fi
              UDID=""
            done
            [ -n "$UDID" ] || { echo "could not create a simulator"; xcrun simctl list devicetypes; exit 1; }
            xcrun simctl boot "$UDID"
            xcrun simctl bootstatus "$UDID" -b || true
            echo "== spawn =="
            set +e
            OUT="$(xcrun simctl spawn "$UDID" "$SMOKE_ABS" 2>&1)"; RC=$?
            set -e
            echo "$OUT"
            echo "== spawn exit: $RC =="
            xcrun simctl shutdown "$UDID" || true
            xcrun simctl delete "$UDID" || true
            echo "$OUT" | grep -q "SMOKE: PASS" || { echo "M3 LOGIC TEST: FAIL (marker missing)"; exit 1; }
            [ "$RC" -eq 0 ] || { echo "M3 LOGIC TEST: FAIL (exit $RC)"; exit 1; }
            echo "M3 LOGIC TEST: PASS"
          } 2>&1 | tee ../../ci-sim-run.log

      - name: Commit M3 debug logs
        if: always()
        run: |
          mkdir -p ci-logs-m3
          for l in ci-qt-ios-layout ci-sim-configure ci-sim-build ci-sim-inspect ci-sim-run; do
            cp "$l.log" ci-logs-m3/ 2>/dev/null || true
          done
          cp backend/qcad-core/build-sim/CMakeFiles/CMakeError.log ci-logs-m3/ 2>/dev/null || true
          git config user.email "ci@ipadprocad.local"
          git config user.name "iPadProCAD CI"
          git add -f ci-logs-m3
          git commit -m "CI(M3): iOS-sim logic-test logs from run ${{ github.run_id }}" || exit 0
          git push origin HEAD:ci-debug-logs-m3 --force

      - name: Upload M3 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipadprocad-m3-sim-logic
          path: |
            ci-sim-run.log
            ci-sim-build.log
          if-no-files-found: warn
