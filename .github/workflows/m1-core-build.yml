name: Core + C-API Build (iOS)  # M1 core (green) + M2 C-ABI wrapper & iOS bundle

on:
  push:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

permissions:
  contents: write

# Bei schnellen aufeinanderfolgenden Pushes den veralteten Run abbrechen
# (spart Minuten & Artefakt-Storage).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # FAST FEEDBACK — läuft parallel zu allem anderen und wird in ~3 min rot.
  #
  # Warum: `flutter analyze` + die Host-Tests laufen ausserdem in
  # `m5-flutter-ipa`, dort aber erst NACH Qt-Install, OCCT-Cache und
  # Core-Build. Ein Dart-Tippfehler kostete dadurch ~20 Minuten statt ~3.
  # Dieser Job dupliziert die beiden Schritte bewusst auf einem billigen
  # ubuntu-Runner; die Prüfungen in m5 bleiben als Absicherung stehen (sie
  # laufen dort gegen das per `flutter create` erzeugte Projekt).
  #
  # Kein iOS-Scaffolding hier: `flutter analyze`/`test` brauchen nur
  # `pub get`. Die In-Repo-Plugin-Pods sind Path-Dependencies mit reinem
  # Dart-Interface, das auf Linux auflösbar ist.
  dart-checks:
    name: Dart analyze + host tests (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: frontend
        run: flutter pub get

      - name: Analyze Dart
        working-directory: frontend
        run: |
          set -o pipefail
          # infos/warnings duerfen nicht failen — nur echte Fehler (gleiche
          # Flags wie in m5, sonst weichen die beiden Jobs auseinander).
          flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings 2>&1 \
            | tee ../ci-dart-analyze.log

      - name: Host tests
        working-directory: frontend
        run: |
          set -o pipefail
          # pipefail macht den Exitcode massgeblich. NICHT nach einer
          # Erfolgsmeldung greppen — die Formulierung wechselt zwischen
          # Flutter-Versionen.
          flutter test 2>&1 | tee ../ci-dart-tests.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-checks-logs
          path: |
            ci-dart-analyze.log
            ci-dart-tests.log
          if-no-files-found: ignore

  build-core-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (host, for tools)
        id: qt_host_install
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt-host'
          cache: true

      - name: Capture host Qt path
        id: qt_host
        run: |
          echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"
          echo "QT_ROOT_DIR after host install: ${QT_ROOT_DIR}" > env-dump.log

      - name: Install Qt6 (iOS)
        id: qt_ios_install
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          dir: '${{ github.workspace }}/qt-ios'
          cache: true

      - name: Capture iOS Qt path
        id: qt_ios
        run: |
          echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"
          echo "QT_ROOT_DIR after iOS install: ${QT_ROOT_DIR}" >> env-dump.log

      - name: Install Ninja
        run: brew install ninja

      - name: Configure (iOS target)
        working-directory: backend/qcad-core
        run: |
          {
          set -o pipefail
          echo "qt_host path: ${{ steps.qt_host.outputs.path }}"
          echo "qt_ios path: ${{ steps.qt_ios.outputs.path }}"
          ls "${{ steps.qt_host.outputs.path }}/lib/cmake/Qt6CoreTools" 2>&1 || echo "no Qt6CoreTools dir at host path"
          # QCAD_CAPI_SMOKE stays OFF on iOS: there is no link step for .a there,
          # so the executable smoke test only runs on the Linux host build.
          cmake -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON
          } 2>&1 | tee ../../ci-configure.log

      - name: Build (core + C-API wrapper)
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          # -k 0 (keep-going): surface ALL compile errors in a single run rather
          # than stopping at the first — needed for fast iOS-portability iteration.
          # The static qcadcapi target is part of the tree (root CMakeLists), so
          # this builds the M2 wrapper for arm64/iphoneos alongside the core.
          cmake --build build -j -- -k 0 2>&1 | tee ../../ci-build.log

      - name: Verify static libraries (incl. C-API)
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            expected=(
              release/libqcadcore.a
              release/libqcadentity.a
              release/libqcadoperations.a
              release/libdxflib.a
              plugins/libqcaddxf.a
              release/libqcadcapi.a
            )
            missing=0
            for f in "${expected[@]}"; do
              if [ -f "$f" ]; then
                echo "OK   $f"
                lipo -info "$f" 2>/dev/null || true
              else
                echo "MISSING $f"
                missing=1
              fi
            done
            [ "$missing" -eq 0 ] || { echo "One or more expected libraries are missing."; exit 1; }
          } 2>&1 | tee ../../ci-verify.log

      - name: Bundle combined static library (iOS arm64)
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            # Merge the C-API wrapper + all core libs into a single archive the
            # app can link directly. libtool resolves duplicate members.
            libtool -static -o release/libipadprocad.a \
              release/libqcadcapi.a \
              release/libqcadcore.a \
              release/libqcadentity.a \
              release/libqcadoperations.a \
              plugins/libqcaddxf.a \
              release/libdxflib.a
            echo "Combined library:"
            ls -la release/libipadprocad.a
            lipo -info release/libipadprocad.a
          } 2>&1 | tee ../../ci-bundle.log

      - name: Package XCFramework (best-effort)
        id: xcframework
        continue-on-error: true
        working-directory: backend/qcad-core
        run: |
          set -e
          set -o pipefail
          {
            rm -rf release/ipadprocad.xcframework include-public
            mkdir -p include-public
            cp src/capi/qcad_capi.h include-public/
            xcodebuild -create-xcframework \
              -library release/libipadprocad.a -headers include-public \
              -output release/ipadprocad.xcframework
            echo "XCFramework created:"
            find release/ipadprocad.xcframework -maxdepth 2 -print
          } 2>&1 | tee ../../ci-xcframework.log

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: ipadprocad-ios-capi
          path: |
            backend/qcad-core/release/libipadprocad.a
            backend/qcad-core/src/capi/qcad_capi.h
            backend/qcad-core/release/ipadprocad.xcframework
          if-no-files-found: warn

      - name: Commit debug logs
        if: always()
        run: |
          mkdir -p ci-logs
          for l in env-dump ci-configure ci-build ci-verify ci-bundle ci-xcframework; do
            cp "$l.log" ci-logs/ 2>/dev/null || true
          done
          cp backend/qcad-core/build/CMakeFiles/CMakeError.log ci-logs/ 2>/dev/null || true
          cp backend/qcad-core/build/CMakeFiles/CMakeOutput.log ci-logs/ 2>/dev/null || true
          git config user.email "ci@ipadprocad.local"
          git config user.name "iPadProCAD CI"
          git add -f ci-logs
          git commit -m "CI: debug logs from run ${{ github.run_id }}" || exit 0
          git push origin HEAD:ci-debug-logs --force

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: core-capi-build-log
          path: backend/qcad-core/build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # M3 — headless logic test on iOS. Builds the C-API + core + smoke for the
  # iphonesimulator (arm64) using the same CMake/Qt path proven for the device
  # in build-core-ios, then runs the smoke INSIDE a booted iOS Simulator via
  # `simctl spawn` and asserts "SMOKE: PASS". This exercises the real QCAD core
  # logic (entity create/count/bbox + DXF round-trip) on the iOS runtime.
  # NOTE: exercising the Dart FFI on-device needs the Flutter/Dart runtime and
  # is deferred to M4 (see HANDOFF.md).
  # ---------------------------------------------------------------------------
  m3-ios-sim-logic:
    name: M3 headless logic test (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (host, for tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt-host'
          cache: true

      - name: Capture host Qt path
        id: qt_host
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Qt6 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          dir: '${{ github.workspace }}/qt-ios'
          cache: true

      - name: Capture iOS Qt path
        id: qt_ios
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Ninja
        run: brew install ninja

      - name: Probe Qt iOS architectures (diagnostic)
        run: |
          {
            QTIOS="${{ steps.qt_ios.outputs.path }}"
            echo "iOS Qt path: $QTIOS"
            echo "== arch of the static libs =="
            for l in libQt6Core.a libQt6Gui.a libQt6Xml.a; do
              printf '%s: ' "$l"; lipo -info "$QTIOS/lib/$l" 2>&1 || true
            done
            echo "== arch/platform of a prebuilt Qt resource object =="
            OBJ="$QTIOS/lib/objects-Release/Gui_resources_1/.qt/rcc/qrc_qpdf_init.cpp.o"
            file "$OBJ" 2>&1 || true
            otool -l "$OBJ" 2>/dev/null | grep -A4 -i 'LC_BUILD_VERSION' | head -20 || true
            echo "== any simulator-specific tree? =="
            find "$QTIOS" -iname '*simulator*' 2>/dev/null | head -20 || true
          } 2>&1 | tee ci-qt-ios-layout.log

      - name: Configure (iOS Simulator, x86_64)
        working-directory: backend/qcad-core
        run: |
          # pipefail MUSS ausserhalb des { }|tee stehen: innerhalb wirkt es nur
          # in der Subshell und der Step-Status waere der von tee (immer 0).
          set -o pipefail
          {
          # The Qt-for-iOS package ships UNIVERSAL archives/objects:
          #   arm64  slice -> platform 2 (iOS device)
          #   x86_64 slice -> platform 7 (iOS Simulator)
          # There is no arm64-simulator slice, so the simulator logic test must
          # be built for x86_64 (runs via Rosetta on the arm64 runner).
          # Qt's prebuilt resource objects have minos 14.0 -> deployment 14.0.
          cmake -B build-sim \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON \
            -DQCAD_CAPI_SMOKE=ON
          } 2>&1 | tee ../../ci-sim-configure.log

      - name: Build (core + C-API + smoke, simulator)
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          cmake --build build-sim -j -- -k 0 2>&1 | tee ../../ci-sim-build.log

      - name: Locate & inspect smoke binary
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          {
            SMOKE="$(find . -name qcad_capi_smoke -type f | head -1)"
            echo "smoke binary (relative): $SMOKE"
            [ -n "$SMOKE" ] || { echo "smoke binary not found"; exit 1; }
            SMOKE_ABS="$(cd "$(dirname "$SMOKE")" && pwd)/$(basename "$SMOKE")"
            echo "$SMOKE_ABS" > ../../smoke_path.txt
            echo "smoke binary (abs): $SMOKE_ABS"
            file "$SMOKE_ABS" || true
            lipo -info "$SMOKE_ABS" || true
            echo "== build-version load command (expect platform 7 = iOS Simulator) =="
            otool -l "$SMOKE_ABS" | grep -A5 -i 'LC_BUILD_VERSION' | head -40 || true
          } 2>&1 | tee ../../ci-sim-inspect.log

      - name: Boot simulator & run headless logic test
        timeout-minutes: 20
        working-directory: backend/qcad-core
        run: |
          # pipefail MUSS ausserhalb des { }|tee stehen (sonst falsches Gruen:
          # Run 29043802347 meldete gruen trotz "M3 LOGIC TEST: FAIL" im Log).
          set -o pipefail
          {
            SMOKE_ABS="$(cat ../../smoke_path.txt)"
            APP_DIR="$(dirname "$SMOKE_ABS")"
            echo "smoke: $SMOKE_ABS"
            echo "app bundle: $APP_DIR"
            # x86_64-Sim-Prozess auf arm64-Runner braucht Rosetta.
            sudo softwareupdate --install-rosetta --agree-to-license || true
            # WICHTIG (Erkenntnis aus Run 29043802347): `simctl spawn` haengt mit
            # 0 Byte Output. Ursache: das statisch gelinkte Qt-iOS-Platform-Plugin
            # interponiert main() und startet UIApplicationMain; ohne UI-Kontext
            # (spawn) laeuft unser main nie an. Daher: als echte App installieren
            # und mit `launch --console-pty` starten — dann ruft Qt unser main
            # nach dem UIApplication-Start auf und stdout wird durchgereicht.
            # Die von CMake generierte Default-Info.plist hat LEERE Pflichtfelder
            # (CFBundleIdentifier/-Version leer -> "does not contain
            # CFBundleVersion" beim simctl install, Run 29045268701). Daher
            # IMMER mit einer minimalen gueltigen Plist ueberschreiben.
            echo "writing minimal Info.plist (overwriting CMake default)"
              printf '%s\n' \
                '<?xml version="1.0" encoding="UTF-8"?>' \
                '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
                '<plist version="1.0"><dict>' \
                '  <key>CFBundleIdentifier</key><string>com.ipadprocad.smoke</string>' \
                '  <key>CFBundleExecutable</key><string>qcad_capi_smoke</string>' \
                '  <key>CFBundleName</key><string>qcad_capi_smoke</string>' \
                '  <key>CFBundlePackageType</key><string>APPL</string>' \
                '  <key>CFBundleVersion</key><string>1</string>' \
                '  <key>CFBundleShortVersionString</key><string>1.0</string>' \
                '  <key>MinimumOSVersion</key><string>14.0</string>' \
                '</dict></plist>' > "$APP_DIR/Info.plist"
            BID="com.ipadprocad.smoke"
            echo "bundle id: $BID"
            cat "$APP_DIR/Info.plist"
            UDID=""
            for name in "iPhone 15" "iPhone 14" "iPhone SE (3rd generation)" "iPhone 15 Pro"; do
              if UDID="$(xcrun simctl create m3-iphone "$name" 2>/dev/null)"; then
                echo "created sim '$name' -> $UDID"; break
              fi
              UDID=""
            done
            [ -n "$UDID" ] || { echo "could not create a simulator"; xcrun simctl list devicetypes; exit 1; }
            xcrun simctl boot "$UDID"
            for i in $(seq 1 24); do
              STATE="$(xcrun simctl list devices | grep "$UDID" | grep -o 'Booted' || true)"
              [ "$STATE" = "Booted" ] && { echo "sim booted (after ~$((i*5))s)"; break; }
              sleep 5
            done
            xcrun simctl install "$UDID" "$APP_DIR"
            echo "== launch (console-pty) =="
            set +e
            # perl-alarm = Hard-Timeout (5 min); macOS hat kein timeout(1).
            OUT="$(perl -e 'alarm 300; exec @ARGV or die "exec: $!"' -- xcrun simctl launch --console-pty --terminate-running-process "$UDID" "$BID" 2>&1)"; RC=$?
            set -e
            echo "$OUT"
            echo "== launch exit: $RC =="
            xcrun simctl shutdown "$UDID" || true
            xcrun simctl delete "$UDID" || true
            # Urteil ueber den Marker, nicht den launch-RC (der RC von
            # `simctl launch` ist nicht der Exit-Code der App). rc=142 (SIGALRM)
            # heisst Haenger -> in dem Fall fehlt der Marker ohnehin.
            echo "$OUT" | grep -q "SMOKE: FAIL" && { echo "M3 LOGIC TEST: FAIL (smoke reported failures)"; exit 1; }
            echo "$OUT" | grep -q "SMOKE: PASS" || { echo "M3 LOGIC TEST: FAIL (PASS marker missing, launch rc=$RC)"; exit 1; }
            echo "M3 LOGIC TEST: PASS"
          } 2>&1 | tee ../../ci-sim-run.log

      - name: Commit M3 debug logs
        if: always()
        run: |
          mkdir -p ci-logs-m3
          for l in ci-qt-ios-layout ci-sim-configure ci-sim-build ci-sim-inspect ci-sim-run; do
            cp "$l.log" ci-logs-m3/ 2>/dev/null || true
          done
          cp backend/qcad-core/build-sim/CMakeFiles/CMakeError.log ci-logs-m3/ 2>/dev/null || true
          git config user.email "ci@ipadprocad.local"
          git config user.name "iPadProCAD CI"
          git add -f ci-logs-m3
          git commit -m "CI(M3): iOS-sim logic-test logs from run ${{ github.run_id }}" || exit 0
          git push origin HEAD:ci-debug-logs-m3 --force

      - name: Upload M3 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: ipadprocad-m3-sim-logic
          path: |
            ci-sim-run.log
            ci-sim-build.log
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # M5 — Flutter app (1:1 UI port) linked against the QCAD core, packaged as an
  # UNSIGNED IPA for sideloading (AltStore/Sideloadly re-sign on install).
  #
  # Link strategy: the combined static lib (libipadprocad.a) is force-loaded
  # into the Runner binary and the qcad_* symbols are kept in the export trie
  # (exported_symbols_list) so Dart's DynamicLibrary.process() can dlsym them.
  # All Qt-for-iOS static archives from <qt-ios>/lib are appended; ld64 only
  # extracts referenced members. The qios platform plugin is deliberately NOT
  # linked (it interposes main() -> would hijack Flutter's main, see M3 notes).
  #
  # Honest-verdict notes:
  #  - "M5 LINK CHECK" greps the built Runner binary for the C-API version
  #    string literal, which survives stripping — proof the core is linked in.
  #  - The Dart-FFI runtime smoke ("DART SMOKE: PASS (backend=qcad-ffi...)")
  #    prints at app start ON DEVICE; it is NOT exercised by this job.
  # ---------------------------------------------------------------------------
  m5-flutter-ipa:
    name: M5 Flutter iOS build + unsigned IPA
    # Gated on the fast Dart job. Without this the iOS build kept grinding for
    # the better part of an hour after dart-checks had already gone red three
    # minutes in, producing an IPA that could not possibly be worth installing
    # and burning a macOS runner for nothing. build-core-ios and the simulator
    # smoke test stay independent — they are native and a Dart error says
    # nothing about them.
    needs: dart-checks
    # macos-26 (Tahoe, Xcode 26.x) — NOT cosmetic and NOT optional:
    #
    #  1. The native context menu is a real UIMenu, so its APPEARANCE comes
    #     from the SDK the app is linked against, not from our code. Built
    #     against the iOS 17 SDK on macos-14 it renders in pre-26 compatibility
    #     styling; rebuilt against the iOS 26 SDK the system components adopt
    #     Liquid Glass automatically, with no code change.
    #  2. macos-14 images entered deprecation on 2026-07-06 and are fully
    #     unsupported from 2026-11-02. This migration is forced regardless.
    #
    # Both labels are arm64, so no host architecture changes. Deployment target
    # stays 14.0 (Xcode 26 accepts >= 12.0 despite documenting 15; Qt-iOS needs
    # >= 14.0). Xcode 27 will raise that floor to 15.0 — bump it then.
    #
    # RISK / REVERT: the unknown is Qt 6.7 + the Xcode 26 toolchain building
    # qcad-core. If this job fails at "Configure/Build (iOS target)" while the
    # Flutter steps are fine, revert THIS LINE to macos-14 — the feature commit
    # is independent and needs no runner change. If Qt is the only casualty,
    # the clean fix is to split: build core+slvs on macos-15, upload them as
    # artifacts, and link the IPA here (old .a files link fine with a newer ld).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Print the toolchain FIRST: this is the single line that tells us
      # whether the IPA can carry the iOS 26 appearance at all, and it makes a
      # runner-image change obvious at the top of the log instead of halfway
      # down a linker error.
      - name: Toolchain / SDK report
        run: |
          set -o pipefail
          sw_vers
          xcodebuild -version
          echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"
          MAJOR="$(xcrun --sdk iphoneos --show-sdk-version | cut -d. -f1)"
          if [ "${MAJOR:-0}" -ge 26 ]; then
            echo "LIQUID GLASS CHECK: PASS (building against iOS SDK $MAJOR)"
          else
            echo "LIQUID GLASS CHECK: WARN (iOS SDK $MAJOR < 26 — the context"
            echo "menu will still be a real UIMenu, but in legacy styling)"
          fi

      - name: Install Qt6 (host, for tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt-host'
          cache: true

      - name: Capture host Qt path
        id: qt_host
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Qt6 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          dir: '${{ github.workspace }}/qt-ios'
          cache: true

      - name: Capture iOS Qt path
        id: qt_ios
        run: echo "path=${QT_ROOT_DIR}" >> "$GITHUB_OUTPUT"

      - name: Install Ninja
        run: brew install ninja

      - name: Configure + build core & C-API (iOS device, arm64)
        working-directory: backend/qcad-core
        run: |
          set -o pipefail
          {
          cmake -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.qt_ios.outputs.path }}/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DQT_HOST_PATH="${{ steps.qt_host.outputs.path }}" \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_QT6=ON \
            -DQCAD_CAPI_SMOKE=ON
          # The smoke exe is built for the DEVICE here purely to make CMake
          # emit the authoritative link line (link.txt) incl. the finalizer-
          # GENERATED Qml type-registration objects. Those exist nowhere in
          # the Qt package (undefined QQml*Foreign, runs 29143874907/...136545/
          # ...547027); only the consumer build generates them.
          cmake --build build -j -- -k 0
          libtool -static -o release/libipadprocad.a \
            release/libqcadcapi.a \
            release/libqcadcore.a \
            release/libqcadentity.a \
            release/libqcadoperations.a \
            plugins/libqcaddxf.a \
            release/libdxflib.a
          lipo -info release/libipadprocad.a
          } 2>&1 | tee ../../ci-m5-core.log

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Scaffold iOS project (flutter create) + pub get
        working-directory: frontend
        run: |
          set -o pipefail
          {
          flutter --version
          flutter create --platforms=ios --org com.ipadprocad --project-name ipadprocad .
          # Expose the app's Documents dir (incl. logs/ipadprocad_log.txt)
          # in the iPad Files app for on-device crash debugging.
          /usr/libexec/PlistBuddy -c 'Add :UIFileSharingEnabled bool true' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Add :LSSupportsOpeningDocumentsInPlace bool true' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :UIFileSharingEnabled' ios/Runner/Info.plist
          # flutter create generates a template test referencing MyApp,
          # which doesn't exist in our app -> would fail flutter analyze
          rm -f test/widget_test.dart
          flutter pub get
          # Qt-iOS prebuilt objects require minos 14.0 -> raise everywhere.
          # (Target-level pbxproj settings override xcconfig, so patch pbxproj.)
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' ios/Runner.xcodeproj/project.pbxproj
          # Generate the CocoaPods setup without compiling, then pin platform.
          flutter build ios --config-only --release --no-codesign \
            --dart-define=GIT_SHA=${GITHUB_SHA::7}
          if [ -f ios/Podfile ]; then
            sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/" ios/Podfile
            sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/" ios/Podfile
          fi
          } 2>&1 | tee ../ci-m5-scaffold.log

      - name: Dart unit tests (solver + dimension system)
        working-directory: frontend
        run: |
          set -o pipefail
          # pipefail makes flutter test's exit code authoritative. Do NOT grep
          # for a success phrase: the wording changes between Flutter versions
          # ("All tests passed!" vs "🎉 18 tests passed.").
          flutter test 2>&1 | tee ../ci-m5-dart-tests.log

      - name: Build libslvs static (iOS device, arm64)
        working-directory: backend/slvs
        run: |
          set -o pipefail
          cmake -S . -B build-ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ios -j
          test -f build-ios/libslvs.a || { echo "MISSING build-ios/libslvs.a"; exit 1; }
          lipo -info build-ios/libslvs.a

      # --- OCCT (3D B-Rep + STEP kernel, backend/occt) ---------------------
      # The heavy OCCT build is CACHED and shared with occt-build.yml via an
      # identical key: normally that isolated workflow (or a previous run of
      # this job) has already populated it and this restores in seconds. On a
      # cold cache this job self-heals by building OCCT itself (~40-60 min,
      # once). Keep key + flags in sync with .github/workflows/occt-build.yml
      # and backend/occt/VENDOR.md; bump -r1 when the flags change.
      - name: Cache OpenCASCADE iOS install tree
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: backend/occt/install-ios
          key: occt-ios-arm64-V7_9_3-r1

      - name: Build OpenCASCADE static (iOS device, arm64, cache miss only)
        if: steps.occt-cache.outputs.cache-hit != 'true'
        timeout-minutes: 150
        working-directory: backend/occt
        run: |
          set -o pipefail
          git -C "$GITHUB_WORKSPACE" submodule update --init --depth 1 \
            -- backend/occt/upstream \
            || git -C "$GITHUB_WORKSPACE" submodule update --init \
                 -- backend/occt/upstream
          git -C upstream log --oneline -1
          cmake -S upstream -B build-occt-ios -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DINSTALL_DIR="$GITHUB_WORKSPACE/backend/occt/install-ios" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LIBRARY_TYPE=Static \
            -DBUILD_MODULE_FoundationClasses=ON \
            -DBUILD_MODULE_ModelingData=ON \
            -DBUILD_MODULE_ModelingAlgorithms=ON \
            -DBUILD_MODULE_DataExchange=ON \
            -DBUILD_MODULE_ApplicationFramework=OFF \
            -DBUILD_MODULE_Visualization=OFF \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_DETools=OFF \
            -DBUILD_DOC_Overview=OFF \
            -DUSE_FREETYPE=OFF -DUSE_TK=OFF -DUSE_XLIB=OFF \
            -DUSE_FREEIMAGE=OFF -DUSE_OPENVR=OFF -DUSE_FFMPEG=OFF \
            -DUSE_RAPIDJSON=OFF -DUSE_DRACO=OFF -DUSE_TBB=OFF -DUSE_VTK=OFF \
            2>&1 | tail -25
          cmake --build build-occt-ios -j 2>&1 | tail -25
          cmake --install build-occt-ios > /dev/null

      - name: Build OCCT C shim static (iOS device, arm64)
        working-directory: backend/occt
        run: |
          set -o pipefail
          ls "$GITHUB_WORKSPACE/backend/occt/install-ios/lib/cmake/opencascade/"
          # MODE_PACKAGE=BOTH: iOS cross-compiles re-root find_package into
          # the SDK sysroot by default (Darwin.cmake ONLY) — without this the
          # prefix path is invisible. Lesson from run 29807468644/...679.
          cmake -S . -B build-ios -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/backend/occt/install-ios"
          cmake --build build-ios -j
          test -f build-ios/libocct_capi.a || { echo "MISSING build-ios/libocct_capi.a"; exit 1; }
          lipo -info build-ios/libocct_capi.a

      - name: Inject FFI link flags (xcconfig)
        working-directory: frontend
        run: |
          set -o pipefail
          {
          QTIOS="${{ steps.qt_ios.outputs.path }}"
          CORE="$GITHUB_WORKSPACE/backend/qcad-core/release"
          BUILD="$GITHUB_WORKSPACE/backend/qcad-core/build"
          SLVS="$GITHUB_WORKSPACE/backend/slvs/build-ios"
          OCCT="$GITHUB_WORKSPACE/backend/occt"
          # Every OCCT toolkit archive as an explicit path: ld64 extracts
          # only referenced members, so unused toolkits cost nothing, and
          # Apple's linker needs no ordering/groups for static archives.
          OCCTLIBS="$(ls "$OCCT/install-ios/lib"/libTK*.a | tr '\n' ' ')"
          echo "OCCT archives on the link line: $(echo "$OCCTLIBS" | wc -w)"
          # Ninja has no link.txt; ask ninja for the smoke's exact link
          # command instead (executed with cwd = build root).
          LINKCMD="$(mktemp)"
          ninja -C "$BUILD" -t commands | grep -E -- "-o [^ ]*qcad_capi_smoke( |$)" | tail -1 > "$LINKCMD"
          [ -s "$LINKCMD" ] || { echo "smoke link command not found via ninja -t commands"; exit 1; }
          cat "$LINKCMD"
          # Translate the authoritative link line into linker inputs for
          # Xcode (keeps .o/.a incl. the GENERATED Qml registration objects,
          # -l*, -framework pairs, -Wl,*; drops driver flags, -o, smoke.c.o).
          QTLIBS="$(python3 "$GITHUB_WORKSPACE/ci/parse_link_txt.py" "$LINKCMD" "$BUILD")"
          echo "parsed link inputs ($(echo "$QTLIBS" | wc -w) tokens):"
          echo "$QTLIBS" | tr ' ' '\n' | sed '/^$/d'
          printf '_qcad_*\n_slvs_*\n_occt_*\n' > ios/Flutter/qcad_symbols.exp
          cat > ios/Flutter/ffi.xcconfig <<XC
          OTHER_LDFLAGS = \$(inherited) -force_load $CORE/libipadprocad.a -force_load $SLVS/libslvs.a -force_load $OCCT/build-ios/libocct_capi.a $OCCTLIBS $QTLIBS -framework UIKit -framework Foundation -framework CoreFoundation -framework CoreGraphics -framework CoreText -framework CoreServices -framework Security -framework SystemConfiguration -framework CFNetwork -framework Metal -framework MetalKit -framework QuartzCore -framework ImageIO -framework UniformTypeIdentifiers -framework IOSurface -framework OpenGLES -framework IOKit -framework RealityKit -framework ARKit -lz -lc++ -Wl,-exported_symbols_list,\$(SRCROOT)/Flutter/qcad_symbols.exp
          IPHONEOS_DEPLOYMENT_TARGET = 14.0
          XC
          # strip the heredoc's leading indentation xcconfig can't handle
          sed -i '' 's/^          //' ios/Flutter/ffi.xcconfig
          for f in ios/Flutter/Debug.xcconfig ios/Flutter/Release.xcconfig ios/Flutter/Profile.xcconfig; do
            [ -f "$f" ] && printf '\n#include "ffi.xcconfig"\n' >> "$f" && echo "patched $f"
          done
          cat ios/Flutter/ffi.xcconfig
          } 2>&1 | tee ../ci-m5-xcconfig.log

      - name: Analyze Dart (surface compile errors clearly)
        working-directory: frontend
        run: |
          set -o pipefail
          # infos/warnings must not fail the build — only real errors
          flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings 2>&1 | tee ../ci-m5-analyze.log

      - name: Build iOS app (release, unsigned)
        timeout-minutes: 45
        working-directory: frontend
        run: |
          # pipefail MUSS ausserhalb des { }|tee stehen (M3-Lektion).
          set -o pipefail
          flutter build ios --release --no-codesign \
            --dart-define=GIT_SHA=${GITHUB_SHA::7} 2>&1 | tee ../ci-m5-build.log

      - name: Verify core is linked (M5 LINK CHECK) & package IPA
        working-directory: frontend
        run: |
          set -o pipefail
          {
          APP="build/ios/iphoneos/Runner.app"
          [ -d "$APP" ] || { echo "M5 LINK CHECK: FAIL (Runner.app missing)"; exit 1; }
          # grep -c statt -q: -q beendet grep beim ersten Treffer -> SIGPIPE an
          # strings -> mit pipefail schlaegt die Pipeline trotz Treffer fehl
          # (Run 29145123176: "strings: failed to flush output").
          # qt_main_wrapper in the binary = qios plugin linked = the
          # double-UIApplicationMain launch crash (Runner-…-141719.ips).
          QTMAIN="$(nm -gU "$APP/Runner" 2>/dev/null | grep -c qt_main_wrapper || true)"
          QTMAIN2="$(strings "$APP/Runner" | grep -c qt_main_wrapper || true)"
          if [ "${QTMAIN:-0}" -gt 0 ] || [ "${QTMAIN2:-0}" -gt 0 ]; then
            echo "M6 QIOS CHECK: FAIL (qt_main_wrapper present — qios plugin linked, app will crash at launch)"; exit 1
          fi
          echo "M6 QIOS CHECK: PASS (no qt_main_wrapper in Runner)"
          HITS="$(strings "$APP/Runner" | grep -c "iPadProCAD C-API" || true)"
          if [ "${HITS:-0}" -gt 0 ]; then
            echo "M5 LINK CHECK: PASS (C-API version string present in Runner binary)"
          else
            echo "M5 LINK CHECK: FAIL (C-API not linked into Runner)"; exit 1
          fi
          SHITS="$(strings "$APP/Runner" | grep -c "iPadProCAD SLVS shim" || true)"
          if [ "${SHITS:-0}" -gt 0 ]; then
            echo "SLVS LINK CHECK: PASS (libslvs shim marker present in Runner binary)"
          else
            echo "SLVS LINK CHECK: FAIL (libslvs/shim not linked into Runner)"; exit 1
          fi
          OHITS="$(strings "$APP/Runner" | grep -c "iPadProCAD OCCT shim" || true)"
          if [ "${OHITS:-0}" -gt 0 ]; then
            echo "OCCT MARKER CHECK: PASS (OCCT shim version string present in Runner binary)"
          else
            echo "OCCT LINK CHECK: FAIL (OCCT shim not linked into Runner)"; exit 1
          fi
          # Authoritative export check: all 31 _occt_* C symbols (shim v5:
          # v4 surface +occt_cut +occt_common) must sit in the export trie
          # so DynamicLibrary.process() can dlsym them — the
          # exported_symbols_list keeps them through strip/dead_strip
          # (same mechanism as the 14 _qcad_* symbols).
          NOCCT="$(nm -gU "$APP/Runner" 2>/dev/null | grep -c ' _occt_' || true)"
          if [ "${NOCCT:-0}" -ge 31 ]; then
            echo "OCCT LINK CHECK: PASS ($NOCCT _occt_* symbols exported in Runner)"
          else
            echo "OCCT LINK CHECK: FAIL (only ${NOCCT:-0} _occt_* symbols exported, want >= 31)"; exit 1
          fi
          # M60: the RealityKit viewport plugin must be linked (the GPU 3D
          # renderer that replaces the CPU painter on device). The framework
          # shows in the Runner's load commands whether linked normal or weak.
          RKIT="$(otool -L "$APP/Runner" 2>/dev/null | grep -c RealityKit || true)"
          if [ "${RKIT:-0}" -gt 0 ]; then
            echo "REALITYKIT LINK CHECK: PASS (RealityKit framework linked into Runner)"
          else
            echo "REALITYKIT LINK CHECK: FAIL (RealityKit not linked — 3D viewport cannot render)"; exit 1
          fi
          nm -gU "$APP/Runner" | grep _qcad_ | head -20 || echo "(symbol table stripped — export check via strings only)"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          zip -qry ../ipadprocad-unsigned.ipa Payload
          ls -la ../ipadprocad-unsigned.ipa
          } 2>&1 | tee ../ci-m5-verify.log

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 3
          name: ipadprocad-unsigned-ipa
          path: ipadprocad-unsigned.ipa
          if-no-files-found: error

      - name: Commit M5 debug logs
        if: always()
        run: |
          mkdir -p ci-logs-m5
          for l in ci-m5-core ci-m5-scaffold ci-m5-xcconfig ci-m5-analyze ci-m5-build ci-m5-verify; do
            cp "$l.log" ci-logs-m5/ 2>/dev/null || true
          done
          git config user.email "ci@ipadprocad.local"
          git config user.name "iPadProCAD CI"
          git add -f ci-logs-m5
          git commit -m "CI(M5): Flutter-IPA build logs from run ${{ github.run_id }}" || exit 0
          git push origin HEAD:ci-debug-logs-m5 --force
