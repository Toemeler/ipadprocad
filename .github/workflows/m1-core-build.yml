name: M1 - Headless Core Build (iOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-core-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 (iOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: 'ios'
          cache: true

      - name: Install Qt6 (host, for tools)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install Ninja
        run: brew install ninja

      - name: Configure (iOS target)
        working-directory: backend/qcad-core
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_QT6=ON

      - name: Build
        working-directory: backend/qcad-core
        run: cmake --build build -j

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m1-core-build-log
          path: backend/qcad-core/build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore
